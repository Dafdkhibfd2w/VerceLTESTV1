<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>התחברות | מנהלים ועובדים</title>

  <!-- פונט / אייקונים -->
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <!-- CSS כללי + CSS ייעודי ל-login -->
  <link rel="stylesheet" href="/css/style.css"/>
  <link rel="stylesheet" href="/css/login.css"/>

  <link rel="icon" href="/favicon.ico" />
</head>
<body>
  <main class="login-wrap">
    <div class="login-card" role="region" aria-label="Login Card">

      <!-- צד אינפורמטיבי -->
      <aside class="side-card" aria-label="מידע כללי">
        <h3>ברוך הבא 👋</h3>
        <p class="note">
          כניסה אחודה למנהלים ולעובדים. מנהלים נכנסים עם קוד אימות (OTP), עובדים נכנסים עם אימייל+סיסמה לאחר הצטרפות דרך הזמנה.
        </p>
        <ul class="note">
          <li>אבטחה חזקה (OTP/סיסמה) + תמיכה בעסקים מרובים</li>
          <li>UI אחד – תצוגה דינמית לפי תפקיד</li>
          <li>ניתוב תקני, ולידציות וניהול שגיאות מוקשח</li>
        </ul>
      </aside>

      <!-- אזור טפסים עם טאבים -->
      <section class="tabs" aria-label="Login Area">
        <nav class="tab-list" role="tablist" aria-label="Login Tabs">
          <button class="tab-btn" id="tab-owner" role="tab" aria-controls="panel-owner" aria-selected="true">
            בעלים / מנהל
          </button>
          <button class="tab-btn" id="tab-employee" role="tab" aria-controls="panel-employee" aria-selected="false">
            עובד
          </button>
        </nav>

        <!-- טאב מנהל/בעלים (OTP במייל) -->
        <div id="panel-owner" class="tab-panel active" role="tabpanel" aria-labelledby="tab-owner">
          <form id="ownerForm" class="form-grid" novalidate>
            <div class="form-row row">
              <label class="required" for="nameInput">שם מלא</label>
              <input id="nameInput" name="name" type="text" placeholder="דוגמה: יעל כהן" autocomplete="name" required />
            </div>

            <div class="form-row row">
              <label class="required" for="emailInput">אימייל</label>
              <input id="emailInput" name="email" type="email" placeholder="name@example.com" autocomplete="email" required />
            </div>

            <div class="form-row inline">
              <div class="form-row">
                <label class="required" for="tenantNameInput">שם העסק</label>
                <input id="tenantNameInput" name="tenantName" type="text" placeholder="לדוגמה: ניו דלי" required />
              </div>
              <div class="form-row">
                <label class="" for="tenantPhoneInput">טלפון העסק</label>
                <input id="tenantPhoneInput" name="tenantPhone" type="text" placeholder="052-1234567" />
              </div>
            </div>

            <div class="actions">
              <button id="sendEmailCodeBtn" type="button" class="btn">
                שלח קוד למייל
              </button>

              <div id="codeBlock" class="hidden" aria-hidden="true">
                <label for="codeInput">הכנס קוד שקיבלת</label>
                <input id="codeInput" name="code" type="text" inputmode="numeric" placeholder="6 ספרות" maxlength="6" />
                <button id="verifyEmailCodeBtn" type="button" class="btn btn-secondary">
                  אמת והתחבר
                </button>
              </div>

              <div id="ownerHint" class="note" role="status" aria-live="polite"></div>
            </div>
          </form>
        </div>

        <!-- טאב עובד (אימייל + סיסמה) -->
        <div id="panel-employee" class="tab-panel" role="tabpanel" aria-labelledby="tab-employee">
          <form id="employeeForm" class="form-grid" novalidate>
            <div class="form-frow row">
              <label class="required" for="empEmailInput">אימייל</label>
              <input id="empEmailInput" name="email" type="email" placeholder="name@example.com" autocomplete="username" required />
            </div>
            <div class="form-row row invite-extra" style="display:none">
  <label class="required" for="empNameInput">שם מלא</label>
  <input id="empNameInput" name="name" type="text" placeholder="דוגמה: יעל כהן" autocomplete="name" />
</div>
            <div class="form-row row">
              <label class="required" for="empPasswordInput">סיסמה</label>
              <input id="empPasswordInput" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
            </div>
            <div class="actions">
              <button id="empLoginBtn" class="btn" type="submit">התחבר</button>
              <button id="empForgotBtn" class="btn-link" type="button">שכחתי סיסמה</button>
              <div id="empHint" class="note" role="status" aria-live="polite"></div>
            </div>
          </form>
        </div>
      </section>
    </div>
  </main>

  <!-- שיכבת טעינה/מצב -->
  <div id="pageLoader" style="display:none" aria-hidden="true"></div>

  <!-- JS -->
  <script src="/js/ui.js" defer></script>

  <script src="/js/login-tabs.js" defer></script>
</body>
</html>
